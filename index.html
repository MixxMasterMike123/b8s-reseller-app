<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    
    <!-- Favicon Links -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="shortcut icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/favicon-512.png" />
    <link rel="manifest" href="/manifest.json" />
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="google-site-verification" content="VdZaHTh4JwiHjxpsc_h3u8TMRxLZ1Tg2jU62SN-5fLo" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    
    <!-- Google Fonts - SIMPLIFIED OPTIMIZATION -->
    <!-- Preconnect for faster connection -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- Single optimized font request with display=swap -->
    <!-- Figtree: admin console. Familjen Grotesk + Instrument Sans: NORD storefront (see DESIGN.md). -->
    <link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Familjen+Grotesk:ital,wght@0,400..700;1,400..700&family=Instrument+Sans:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
    
    <!-- Default SEO — generic placeholders. Per-shop deploys override these. -->
    <title>ChopShop</title>
    <meta name="description" content="Quality products, delivered." />

    <!-- Open Graph Meta Tags -->
    <meta property="og:title" content="ChopShop" />
    <meta property="og:description" content="Quality products, delivered." />
    <meta property="og:type" content="website" />

    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ChopShop" />
    <meta name="twitter:description" content="Quality products, delivered." />

    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#459CA8" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
